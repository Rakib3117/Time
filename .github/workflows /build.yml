name: Build TimeGate APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Temporary Node 20 fix
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3️⃣ Reconstruct project structure
      - name: Reconstruct project structure
        run: |
          mkdir -p app/src/main/java/com/kazi/timegate
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # Kotlin source files
          cp MainActivity.kt           app/src/main/java/com/kazi/timegate/ || echo "Missing MainActivity.kt"
          cp AppBlockService.kt        app/src/main/java/com/kazi/timegate/ || echo "Missing AppBlockService.kt"
          cp TimerActivity.kt          app/src/main/java/com/kazi/timegate/ || echo "Missing TimerActivity.kt"
          cp BlockedActivity.kt        app/src/main/java/com/kazi/timegate/ || echo "Missing BlockedActivity.kt"
          cp AppSelectActivity.kt      app/src/main/java/com/kazi/timegate/ || echo "Missing AppSelectActivity.kt"
          cp Adapters.kt               app/src/main/java/com/kazi/timegate/ || echo "Missing Adapters.kt"

          # Layout XML files
          cp activity_main.xml         app/src/main/res/layout/ || echo "Missing activity_main.xml"
          cp activity_timer.xml        app/src/main/res/layout/ || echo "Missing activity_timer.xml"
          cp activity_blocked.xml      app/src/main/res/layout/ || echo "Missing activity_blocked.xml"
          cp activity_app_select.xml   app/src/main/res/layout/ || echo "Missing activity_app_select.xml"
          cp item_monitored_app.xml    app/src/main/res/layout/ || echo "Missing item_monitored_app.xml"
          cp item_app_select.xml       app/src/main/res/layout/ || echo "Missing item_app_select.xml"

          # Values
          cp strings.xml               app/src/main/res/values/ || echo "Missing strings.xml"
          cp colors.xml                app/src/main/res/values/ || echo "Missing colors.xml"
          cp styles.xml                app/src/main/res/values/ || echo "Missing styles.xml"

          # Accessibility service config
          cp accessibility_service.xml app/src/main/res/xml/ || echo "Missing accessibility_service.xml"

          # Manifest
          cp AndroidManifest.xml       app/src/main/ || echo "Missing AndroidManifest.xml"

          # Gradle files
          cp app_build.gradle          app/build.gradle || echo "Missing app_build.gradle"
          cp project_build.gradle      build.gradle || echo "Missing project_build.gradle"
          # settings.gradle is already in repo, no need to copy
          cp gradle.properties         gradle.properties || echo "Missing gradle.properties"

      # 4️⃣ Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5️⃣ Accept Android licenses
      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 6️⃣ Build APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 7️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TimeGate-debug
          path: app/build/outputs/apk/debug/app-debug.apk
